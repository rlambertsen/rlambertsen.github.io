<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okeechobee 2026 Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: 'Space Mono', monospace; color: #39ff14; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 10px 20px; background: #0a0a0a; border-bottom: 1px solid #39ff14; display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
  #header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: #39ff14; text-shadow: 0 0 10px #39ff14; }
  #map { flex: 1; }
  #controls { background: #0d0d0d; border-top: 1px solid #39ff14; padding: 12px 20px; flex-shrink: 0; }
  .ctrl-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .ctrl-group { display: flex; align-items: center; gap: 10px; }
  label { font-size: 11px; color: #39ff14; letter-spacing: 1px; white-space: nowrap; }
  input[type=range] { width: 100px; accent-color: #39ff14; cursor: pointer; }
  .toggle-btn { background: transparent; border: 1px solid #39ff14; color: #39ff14; padding: 4px 12px; font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
  .toggle-btn:hover, .toggle-btn.active { background: #39ff14; color: #0a0a0a; }
  .divider { width: 1px; height: 30px; background: #39ff1440; }
  .section-label { font-size: 10px; color: #39ff1480; letter-spacing: 2px; text-transform: uppercase; }

</style>
</head>
<body>
<div id="header">
  <h1>⬡ OKEECHOBEE 2026</h1>
  <span style="font-size:11px;color:#39ff1480;letter-spacing:2px;">SATELLITE MAP OVERLAY</span>
</div>

<div id="map"></div>

<div id="controls">
  <div class="ctrl-row">
    <span class="section-label">Map</span>
    <div class="ctrl-group">
      <button class="toggle-btn active" id="campToggle" onclick="toggleCamp()">CAMPING</button>
    </div>
    <div class="divider"></div>
    <span class="section-label">Opacity</span>
    <div class="ctrl-group">
      <label>CAMP</label>
      <input type="range" min="0" max="100" value="75" oninput="setOpacity('camp', this.value)">
    </div>
  
  </div>
</div>
